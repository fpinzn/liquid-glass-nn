name: LiquidGlassCapture
options:
  bundleIdPrefix: com.liquidglass
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "16.0"

targets:
  LiquidGlassCapture:
    type: application
    platform: iOS
    sources:
      - LiquidGlassCapture
    settings:
      base:
        INFOPLIST_FILE: LiquidGlassCapture/Info.plist
